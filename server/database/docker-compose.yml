services:
  mariadb:
    image: mariadb:11
    container_name: mariadb_local
    restart: unless-stopped

    env_file:
      - ../../.env

    volumes:
      - ./data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

    ports:
      - "${DB_PORT}:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_local
    restart: unless-stopped

    env_file:
      - ../../.env

    environment:
      PMA_HOST: mariadb

    ports:
      - "${PMA_PORT}:80"

    depends_on:
      - mariadb