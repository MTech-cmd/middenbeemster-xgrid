<script setup>
import { ref, computed, onMounted } from 'vue'
import { useRouter, useRoute } from 'vue-router'
import { getPage, updatePageContent, uploadImage } from '@/services/api.js'

const router = useRouter()
const route  = useRoute()

const page          = ref(null)
const content       = ref({})   // { hero_title: 'Welkom', hero_image: '/uploads/...' }
const loading       = ref(true)
const saving        = ref(false)
const saveSuccess   = ref(false)
const error         = ref(null)
const showPreview   = ref(false)
const uploadingField = ref(null)

const navItems = [
  { label: 'Pages', icon: '▤', route: '/admin/pages' },
  { label: 'Navbar', icon: '☰', route: '/admin' },
]

// Velden per template — ApiName is de sleutel die in Content.ApiName opgeslagen wordt
const templateFields = {
  blank: [
    { key: 'body_text',      label: 'Inhoud',            type: 'textarea' },
  ],
  landing: [
    { key: 'hero_title',     label: 'Hero titel',        type: 'text' },
    { key: 'hero_subtitle',  label: 'Hero subtitel',     type: 'text' },
    { key: 'hero_image',     label: 'Hero afbeelding',   type: 'image' },
    { key: 'cta_label',      label: 'Knoptekst',         type: 'text' },
    { key: 'cta_url',        label: 'Knop URL',          type: 'text' },
    { key: 'section1_title', label: 'Sectie 1 titel',    type: 'text' },
    { key: 'section1_text',  label: 'Sectie 1 tekst',    type: 'textarea' },
    { key: 'section1_image', label: 'Sectie 1 foto',     type: 'image' },
  ],
  blog: [
    { key: 'hero_title',     label: 'Blog titel',        type: 'text' },
    { key: 'hero_image',     label: 'Header afbeelding', type: 'image' },
    { key: 'intro_text',     label: 'Introductie',       type: 'textarea' },
  ],
  contact: [
    { key: 'hero_title',     label: 'Paginatitel',       type: 'text' },
    { key: 'intro_text',     label: 'Introductietekst',  type: 'textarea' },
    { key: 'hero_image',     label: 'Header afbeelding', type: 'image' },
    { key: 'email',          label: 'Contactmail',       type: 'text' },
  ],
}

// Template kolom heet in de DB "Template" (was "Texmplate")
const fields = computed(() =>
  page.value
    ? (templateFields[page.value.Template?.toLowerCase()] ?? templateFields.blank)
    : []
)

async function fetchPage() {
  loading.value = true; error.value = null
  try {
    const data = await getPage(route.params.id)
    page.value = data

    // Backend levert content als { ApiName: { value, type } }
    // We zetten dit om naar { hero_title: 'Welkom', ... } voor v-model binding
    content.value = Object.fromEntries(
      Object.entries(data.content ?? {}).map(([key, obj]) => [key, obj.value ?? ''])
    )
  } catch (err) {
    error.value = err.message
  } finally {
    loading.value = false
  }
}

async function save() {
  saving.value = true; saveSuccess.value = false; error.value = null
  try {
    await updatePageContent(route.params.id, content.value)
    saveSuccess.value = true
    setTimeout(() => saveSuccess.value = false, 2500)
  } catch (err) {
    error.value = err.message
  } finally {
    saving.value = false
  }
}

async function handleImageUpload(field, event) {
  const file = event.target.files[0]
  if (!file) return
  uploadingField.value = field.key
  try {
    content.value[field.key] = await uploadImage(file)
  } catch (err) {
    error.value = err.message
  } finally {
    uploadingField.value = null
  }
}

function removeImage(key) { content.value[key] = null }
function logout() { console.log('Logout') }

onMounted(fetchPage)
</script>

<template>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">Admin</span>
      </div>
      <nav class="sidebar-nav">
        <button v-for="item in navItems" :key="item.label" class="nav-item" @click="router.push(item.route)">
          <span class="nav-icon">{{ item.icon }}</span><span>{{ item.label }}</span>
        </button>
      </nav>
      <button class="logout-btn" @click="logout"><span>↩</span> Logout</button>
    </aside>

    <!-- Main -->
    <main class="content">
      <div v-if="loading" class="center-state"><span class="spinner lg"></span><p>Pagina laden...</p></div>
      <div v-else-if="error && !page" class="center-state error"><span>⚠</span><p>{{ error }}</p></div>

      <template v-else-if="page">
        <!-- Header -->
        <div class="page-header">
          <div class="header-left">
            <button class="back-btn" @click="router.push('/admin/pages')">← Terug</button>
            <div>
              <!-- Kolom heet Template (was Texmplate), route heet Routing -->
              <h1>{{ page.Template }} — <span class="h1-route">{{ page.Routing }}</span></h1>
              <div class="meta-row">
                <code class="route-pill">{{ page.Routing }}</code>
                <span class="template-pill">{{ page.Template }}</span>
                <span class="meta-hint" v-if="page.publishedByName">door {{ page.publishedByName }}</span>
              </div>
            </div>
          </div>
          <div class="header-actions">
            <button class="btn-ghost" @click="showPreview = true"><span>👁</span> Preview</button>
            <button class="btn-primary" :disabled="saving" @click="save">
              <span v-if="saving" class="spinner small"></span>
              <span v-else-if="saveSuccess">✓ Opgeslagen</span>
              <span v-else>Opslaan</span>
            </button>
          </div>
        </div>

        <div v-if="error" class="error-banner">⚠ {{ error }}</div>

        <!-- Editor grid -->
        <div class="editor-grid">
          <div
            v-for="field in fields" :key="field.key"
            class="field-card"
            :class="{ wide: field.type === 'textarea' || field.type === 'image' }"
          >
            <label class="field-label">{{ field.label }}</label>

            <input
              v-if="field.type === 'text'"
              v-model="content[field.key]"
              type="text"
              class="form-input"
              :placeholder="`Voer ${field.label.toLowerCase()} in...`"
            />

            <textarea
              v-else-if="field.type === 'textarea'"
              v-model="content[field.key]"
              class="form-textarea"
              :placeholder="`Voer ${field.label.toLowerCase()} in...`"
              rows="5"
            ></textarea>

            <div v-else-if="field.type === 'image'" class="image-field">
              <div v-if="content[field.key]" class="image-preview-wrap">
                <img :src="content[field.key]" :alt="field.label" class="image-preview" />
                <button class="image-remove" @click="removeImage(field.key)">✕</button>
              </div>
              <label class="upload-zone" :class="{ uploading: uploadingField === field.key }">
                <input type="file" accept="image/*" class="file-input" @change="handleImageUpload(field, $event)" :disabled="uploadingField === field.key" />
                <span v-if="uploadingField === field.key" class="spinner small"></span>
                <span v-else>
                  <span class="upload-icon">↑</span>
                  {{ content[field.key] ? 'Vervang afbeelding' : 'Upload afbeelding' }}
                </span>
              </label>
            </div>
          </div>
        </div>
      </template>
    </main>

    <!-- Sticky save bar -->
    <div class="save-bar" v-if="page">
      <span v-if="saveSuccess" class="save-ok">✓ Wijzigingen opgeslagen</span>
      <span v-else-if="error" class="save-err">⚠ {{ error }}</span>
      <span v-else class="save-hint">Vergeet niet op te slaan</span>
      <button class="btn-primary" :disabled="saving" @click="save">
        <span v-if="saving" class="spinner small"></span>
        {{ saving ? 'Opslaan...' : 'Opslaan' }}
      </button>
    </div>

    <!-- Preview modal -->
    <Transition name="modal">
      <div v-if="showPreview" class="modal-overlay" @click.self="showPreview = false">
        <div class="preview-modal">
          <div class="preview-modal-header">
            <span>Preview — {{ page?.Routing }}</span>
            <button class="modal-close" @click="showPreview = false">✕</button>
          </div>
          <div class="preview-frame-wrap">

            <div v-if="page?.Template?.toLowerCase() === 'landing'" class="tpl tpl-landing">
              <div class="tpl-hero" :style="content.hero_image ? `background-image:url(${content.hero_image})` : ''">
                <div class="tpl-hero-overlay">
                  <h2>{{ content.hero_title || 'Hero titel' }}</h2>
                  <p>{{ content.hero_subtitle || 'Subtitel' }}</p>
                  <button class="tpl-cta">{{ content.cta_label || 'Meer info' }}</button>
                </div>
              </div>
              <div class="tpl-section">
                <img v-if="content.section1_image" :src="content.section1_image" class="tpl-section-img" />
                <div>
                  <h3>{{ content.section1_title || 'Sectie titel' }}</h3>
                  <p>{{ content.section1_text || 'Sectie tekst...' }}</p>
                </div>
              </div>
            </div>

            <div v-else-if="page?.Template?.toLowerCase() === 'blog'" class="tpl tpl-blog">
              <div class="tpl-hero-img" :style="content.hero_image ? `background-image:url(${content.hero_image})` : ''">
                <h2>{{ content.hero_title || 'Blog titel' }}</h2>
              </div>
              <p class="tpl-intro">{{ content.intro_text || 'Introductietekst...' }}</p>
            </div>

            <div v-else-if="page?.Template?.toLowerCase() === 'contact'" class="tpl tpl-contact">
              <div class="tpl-hero-img" :style="content.hero_image ? `background-image:url(${content.hero_image})` : ''">
                <h2>{{ content.hero_title || 'Contact' }}</h2>
              </div>
              <p class="tpl-intro">{{ content.intro_text || 'Introductietekst...' }}</p>
              <div class="tpl-form-mock">
                <div class="tpl-field-mock"></div>
                <div class="tpl-field-mock"></div>
                <div class="tpl-field-mock tall"></div>
                <div class="tpl-btn-mock">Verstuur</div>
              </div>
            </div>

            <div v-else class="tpl tpl-blank">
              <p>{{ content.body_text || 'Geen inhoud.' }}</p>
            </div>
          </div>
        </div>
      </div>
    </Transition>
  </div>
</template>
