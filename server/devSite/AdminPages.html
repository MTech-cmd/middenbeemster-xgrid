<script setup>
import { ref, onMounted } from 'vue'
import { useRouter } from 'vue-router'

const router = useRouter()

const pages = ref([])
const loading = ref(false)
const error = ref(null)
const saving = ref(false)
const deleting = ref(false)

const showAddModal = ref(false)
const modalStep = ref(1)
const previewTemplate = ref(null)
const deleteTarget = ref(null)

const newPage = ref({ title: '', route: '', template: '', active: true })

const navItems = [
  { id: 'pages', label: 'Pages', icon: '▤', route: '/admin/pages' },
  { id: 'navbar', label: 'Navbar', icon: '☰', route: '/admin' },
]

const templates = [
  {
    id: 'blank',
    name: 'Blank',
    preview: '☐',
    description: 'Lege pagina zonder opmaak. Ideaal als je helemaal zelf wil beginnen.',
  },
  {
    id: 'landing',
    name: 'Landing Page',
    preview: '▬\n▭\n▭',
    description: 'Hero-sectie bovenaan met CTA-knop, daarna content blokken.',
  },
  {
    id: 'blog',
    name: 'Blog',
    preview: '▬\n─\n─\n─',
    description: 'Lijst van artikelen met titel, datum en samenvatting.',
  },
  {
    id: 'contact',
    name: 'Contact',
    preview: '▬\n▭\n▭\n■',
    description: 'Contactformulier met naam, e-mail en bericht veld.',
  },
]

function navigateTo(route) {
  router.push(route)
}

function goToEdit(id) {
  router.push(`/admin/pages/${id}`)
}

function openAddModal() {
  newPage.value = { title: '', route: '', template: '', active: true }
  modalStep.value = 1
  showAddModal.value = true
}

function closeAddModal() {
  showAddModal.value = false
}

function confirmDelete(page) {
  deleteTarget.value = page
}

async function fetchPages() {
  loading.value = true
  error.value = null
  try {
    const res = await fetch('http://localhost:3000/api/admin/pages', {
      headers: { 'Content-Type': 'application/json' },
    })
    if (!res.ok) throw new Error(`Server error: ${res.status}`)
    pages.value = await res.json()
  } catch (err) {
    error.value = err.message
  } finally {
    loading.value = false
  }
}

async function addPage() {
  if (!newPage.value.title || !newPage.value.route) return
  saving.value = true
  try {
    const res = await fetch('http://localhost:3000/api/admin/pages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newPage.value),
    })
    if (!res.ok) throw new Error(`Server error: ${res.status}`)
    const created = await res.json()
    pages.value.push(created)
    closeAddModal()
    router.push(`/admin/pages/${created.id}`)
  } catch (err) {
    error.value = err.message
  } finally {
    saving.value = false
  }
}

async function deletePage() {
  if (!deleteTarget.value) return
  deleting.value = true
  try {
    const res = await fetch(`http://localhost:3000/api/admin/pages/${deleteTarget.value.id}`, {
      method: 'DELETE',
    })
    if (!res.ok) throw new Error(`Server error: ${res.status}`)
    pages.value = pages.value.filter(p => p.id !== deleteTarget.value.id)
    deleteTarget.value = null
  } catch (err) {
    error.value = err.message
  } finally {
    deleting.value = false
  }
}

function logout() {
  console.log('Logout')
}

onMounted(fetchPages)
</script>
