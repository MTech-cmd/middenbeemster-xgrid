<template>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">Admin</span>
      </div>
      <nav class="sidebar-nav">
        <button
          v-for="item in navItems"
          :key="item.id"
          class="nav-item"
          :class="{ active: activeSection === item.id }"
          @click="activeSection = item.id"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </button>
      </nav>
      <button class="logout-btn" @click="logout">
        <span>↩</span> Logout
      </button>
    </aside>

    <!-- Main content -->
    <main class="content">
      <!-- Navbar preview section -->
      <section v-if="activeSection === 'navbar'" class="card">
        <div class="card-header">
          <h2>Navbar Preview</h2>
          <span class="badge">Live</span>
        </div>
        <div class="navbar-preview">
          <NavBar />
        </div>
      </section>

      <!-- Pages section -->
      <section v-if="activeSection === 'pages'" class="card">
        <div class="card-header">
          <h2>All Pages</h2>
          <span class="badge">{{ pages.length }} pages</span>
        </div>

        <div v-if="loading" class="state-msg">
          <span class="spinner"></span> Loading pages...
        </div>

        <div v-else-if="error" class="state-msg error">
          ⚠ {{ error }}
        </div>

        <div v-else-if="pages.length === 0" class="state-msg">
          No pages found.
        </div>

        <table v-else class="pages-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Route</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="page in pages" :key="page.id">
              <td class="id-cell">{{ page.id }}</td>
              <td>{{ page.title }}</td>
              <td><code class="route">{{ page.route }}</code></td>
              <td>
                <span class="status-badge" :class="page.active ? 'active' : 'inactive'">
                  {{ page.active ? 'Active' : 'Inactive' }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</template>

<script setup>
import { ref, onMounted } from 'vue'
import NavBar from '../components/NavBar.vue'

const activeSection = ref('pages')
const pages = ref([])
const loading = ref(false)
const error = ref(null)

const navItems = [
  { id: 'pages', label: 'Pages', icon: '▤' },
  { id: 'navbar', label: 'Navbar', icon: '☰' },
]

async function fetchPages() {
  loading.value = true
  error.value = null
  try {
    const response = await fetch('http://localhost:3000/api/admin/pages', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        // Voeg hier je auth header toe indien nodig:
        'Authorization': `Bearer ${token}`
      },
    })
    if (!response.ok) throw new Error(`Server error: ${response.status}`)
    pages.value = await response.json()
  } catch (err) {
    error.value = err.message
  } finally {
    loading.value = false
  }
}

function logout() {
  // Voeg hier logout logica toe
  console.log('Logout')
}

onMounted(() => {
  fetchPages()
})
</script>
